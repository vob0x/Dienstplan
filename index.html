<!DOCTYPE html>
<html lang="de" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0B0F" />
  <meta name="description" content="Dienstplan – Schichtplanung für Teams" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Dienstplan</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script>
    // Auto-recover from stale Service Worker cache (chunk 404 errors)
    function handleChunkError(msg) {
      if (!msg) return;
      if (msg.includes('Failed to fetch dynamically imported module') || msg.includes('Loading chunk') || msg.includes('ERR_ABORTED') || msg.includes('Loading CSS chunk')) {
        if (!sessionStorage.getItem('chunk_retry')) {
          sessionStorage.setItem('chunk_retry', '1');
          if ('caches' in window) caches.keys().then(function(k) { k.forEach(function(n) { caches.delete(n); }); });
          if (navigator.serviceWorker) navigator.serviceWorker.getRegistrations().then(function(r) { r.forEach(function(sw) { sw.unregister(); }); });
          window.location.reload();
        }
      }
    }
    // Catch sync errors
    window.addEventListener('error', function(e) { handleChunkError(e.message); });
    // Catch async errors (dynamic import() failures are unhandled rejections)
    window.addEventListener('unhandledrejection', function(e) {
      var msg = e.reason && (e.reason.message || String(e.reason));
      handleChunkError(msg);
    });
    // Clear retry flag on successful load so future errors can trigger recovery again
    window.addEventListener('load', function() { sessionStorage.removeItem('chunk_retry'); });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
